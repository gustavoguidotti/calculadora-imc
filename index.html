<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Calculadora de IMC</title>
</head>

<body>
    <main>
        <div>
            <h1>Calculadora de IMC</h1>
            <input type="number" name="peso" id="peso" placeholder="Peso (Kg):" required>
            <input type="number" step="0.01" name="altura" id="altura" placeholder="Altura (m):" required>
            <button type="button" id="botaoCalc">Calcular</button>
            <p id="imc">Seu IMC: </p>
            <p id="classificacao-imc">Classificação: </p>
        </div>
    </main>
</body>

</html>
